name: Discover Download URLs
on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium
      
      - name: Scrape All Sites for Download URLs
        run: |
          cat > scrape.mjs << 'NODEEOF'
          import { chromium } from 'playwright';
          
          const sites = [
            { name: 'MobileTVShows', url: 'https://mobiletvshows.site/subfolder-New%20Girl.htm', selector: 'a[href*="downloadmp4.php"], a[href*="episode.php"]' },
            { name: 'FZTVSeries', url: 'https://fztvseries.live/subfolder-New%20Girl.htm', selector: 'a[href*="downloadmp4.php"], a[href*="episode.php"]' },
            { name: 'TVSeriesIN', url: 'https://tvseries.in', selector: 'a[href*="download"], a[href*="episode"]' },
            { name: 'FZMoviesLive', url: 'https://fzmovies.live', selector: 'a[href*="download1.php"], a[href*="movie-"]' },
            { name: 'FZMoviesCC', url: 'https://fzmovies.cc/movie-Men%20in%20Black%20International--hmp4.htm', selector: 'a[href*="download1.php"]' },
            { name: 'Net9ja', url: 'https://www.net9ja.tv/above-the-line-2025/', selector: 'a[href*="dldownload"]' },
            { name: 'Net9jaSeries', url: 'https://net9jaseries.com/avatar-the-last-airbender-season-2/', selector: 'a[href*="wildshare"], a[href*="Episode"]' },
            { name: 'NaijaPrey', url: 'https://www.naijaprey.tv/?s=above+the+line', selector: 'a[href*="np-downloader"], a[href*="sdm_downloads"]' },
          ];
          
          const browser = await chromium.launch({ headless: true });
          
          for (const site of sites) {
            console.log(`\n=== ${site.name} ===`);
            try {
              const context = await browser.newContext({
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36'
              });
              const page = await context.newPage();
              
              // Capture video requests
              page.on('request', (req) => {
                const u = req.url();
                if (u.match(/\.(mp4|mkv|webm|avi|m3u8|mpd)(\?|$)/i)) console.log(`  🎬 VIDEO: ${u.substring(0, 150)}`);
                if (u.match(/download|redirect|go\.php|next\.php|dkey/i)) console.log(`  🔄 REDIRECT: ${u.substring(0, 150)}`);
              });
              page.on('response', async (res) => {
                const ct = res.headers()['content-type'] || '';
                if (ct.includes('video') || ct.includes('octet-stream')) console.log(`  ✅ FILE: HTTP ${res.status()} - ${ct} - ${res.url().substring(0, 150)}`);
              });
              page.on('download', (dl) => console.log(`  📥 DOWNLOAD: ${dl.url()} -> ${dl.suggestedFilename()}`));
              
              console.log(`  URL: ${site.url}`);
              await page.goto(site.url, { waitUntil: 'networkidle', timeout: 30000 });
              
              const links = await page.$$eval(site.selector, els => 
                els.slice(0, 5).map(el => ({ href: el.getAttribute('href'), text: el.textContent?.trim()?.substring(0, 60) }))
              );
              console.log(`  Links found: ${links.length}`);
              links.forEach(l => console.log(`    ${l.text}: ${l.href}`));
              
              // Click first link if found
              if (links.length > 0 && links[0].href) {
                const href = links[0].href.startsWith('http') ? links[0].href : new URL(links[0].href, site.url).href;
                console.log(`  Clicking: ${href.substring(0, 100)}`);
                try {
                  await page.goto(href, { waitUntil: 'networkidle', timeout: 20000 });
                  console.log(`  Landed: ${page.url().substring(0, 150)}`);
                  await page.waitForTimeout(3000);
                  
                  const content = await page.content();
                  const videos = content.match(/https?:\/\/[^"'\s]+\.(?:mp4|mkv|webm)[^"'\s]*/gi) || [];
                  const onclick = content.match(/location\.href\s*=\s*['"]([^'"]+)['"]/gi) || [];
                  console.log(`  Videos in HTML: ${videos.length}, OnClick: ${onclick.length}`);
                  videos.slice(0, 3).forEach(v => console.log(`    ${v.substring(0, 120)}`));
                  onclick.slice(0, 3).forEach(o => console.log(`    ${o.substring(0, 120)}`));
                } catch(e) { console.log(`  Click error: ${e.message}`); }
              }
              
              await context.close();
            } catch(e) { console.log(`  Error: ${e.message}`); }
          }
          
          await browser.close();
          console.log('\n✅ Done!');
          NODEEOF
          
          node scrape.mjs
